name: Build MAUI app cross-platform

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Android Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET SDKs installieren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Java installieren
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK installieren
        uses: android-actions/setup-android@v3

      - name: MAUI Workloads installieren
        run: dotnet workload install maui maui-android wasm-tools --skip-sign-check --source https://api.nuget.org/v3/index.json

      - name: NuGet Pakete wiederherstellen
        run: dotnet restore

      - name: APK/AAB bauen
        run: dotnet publish -f:net8.0-android -c Release -o output-android

      - name: APK/AAB hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Android-Bundle
          path: |
            output-android/*.apk
            output-android/*.aab

  build-windows:
    name: Windows Bundle
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET SDKs installieren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: MAUI Workloads installieren
        run: dotnet workload install maui maui-windows wasm-tools --skip-sign-check --source https://api.nuget.org/v3/index.json

      - name: NuGet Pakete wiederherstellen
        run: dotnet restore

      - name: EXE bauen
        run: dotnet publish -f:net8.0-windows10.0.19041.0 -c Release -o output-win

      - name: EXE hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Bundle
          path: |
            output-win/*.exe

  build-macos:
    name: macOS Bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET SDKs installieren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: MAUI Workloads installieren
        run: dotnet workload install maui maui-maccatalyst wasm-tools --skip-sign-check --source https://api.nuget.org/v3/index.json

      - name: NuGet Pakete wiederherstellen
        run: dotnet restore

      - name: Mac Catalyst App bauen
        run: dotnet publish -f:net8.0-maccatalyst -c Release -o output-mac

      - name: Mac Bundle komprimieren
        run: tar -czvf JunimoModder-mac.tar.gz -C output-mac .

      - name: Mac-Bundle hochladen
        uses: actions/upload-artifact@v4
        with:
          name: MacOS-Bundle
          path: |
            JunimoModder-mac.tar.gz
