name: Build MAUI App Cross-Platform

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Android Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET 9 installieren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Java installieren
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK installieren
        uses: android-actions/setup-android@v3

      - name: MAUI Workloads installieren (Android)
        run: dotnet workload install maui-android wasm-tools --skip-sign-check --source https://api.nuget.org/v3/index.json

      - name: NuGet wiederherstellen
        run: dotnet restore JunimoModder.Android/JunimoModder.Android.csproj

      - name: APK bauen mit Standardname
        run: |
          dotnet publish JunimoModder.Android/JunimoModder.Android.csproj -c Release -o output-android
          APK=$(find output-android -type f -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            APK=$(find output-android -type f -name "*.aab" | head -n1)
          fi
          if [ -z "$APK" ]; then
            echo "Keine APK/AAB gefunden!"
            exit 1
          fi
          cp "$APK" JunimoModder.apk

      - name: APK hochladen (nur 1 Datei)
        uses: actions/upload-artifact@v4
        with:
          name: Android-Bundle
          path: JunimoModder.apk

  build-windows:
    name: Windows Bundle
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET 9 installieren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: MAUI Workloads installieren (Windows)
        run: dotnet workload install maui-windows wasm-tools --skip-sign-check --source https://api.nuget.org/v3/index.json

      - name: NuGet wiederherstellen
        run: dotnet restore JunimoModder.Windows/JunimoModder.Windows.csproj

      - name: EXE bauen mit Standardname
        run: |
          dotnet publish JunimoModder.Windows/JunimoModder.Windows.csproj -c Release -o output-win
          $exe = Get-ChildItem -Path output-win -Filter *.exe | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $exe) { Write-Host "Keine EXE gefunden!"; exit 1 }
          Copy-Item $exe.FullName JunimoModder.exe

      - name: EXE hochladen (nur 1 Datei)
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Bundle
          path: JunimoModder.exe

  build-macos:
    name: macOS Bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET 8 installieren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: MAUI Workload (MacCatalyst)
        run: dotnet workload install maui-maccatalyst wasm-tools --skip-sign-check --source https://api.nuget.org/v3/index.json

      - name: NuGet wiederherstellen
        run: dotnet restore JunimoModder.MacOS/JunimoModder.MacOS.csproj

      - name: Mac Catalyst App bauen und als ZIP verpacken
        run: |
          dotnet publish JunimoModder.MacOS/JunimoModder.MacOS.csproj -c Release -o output-mac
          APP=$(find output-mac -type d -name "*.app" | head -n1)
          if [ -z "$APP" ]; then
            echo "Keine .app gefunden!"
            exit 1
          fi
          zip -r JunimoModder.zip "$APP"

      - name: Mac-Bundle hochladen (nur 1 Datei)
        uses: actions/upload-artifact@v4
        with:
          name: MacOS-Bundle
          path: JunimoModder.zip
