name: Build MAUI App Cross-Platform

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Android Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET 9 installieren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Java installieren
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK installieren
        uses: android-actions/setup-android@v3

      # Achtung: KEIN "maui"-Meta-Workload, nur maui-android und wasm-tools!
      - name: MAUI Workloads installieren (nur für Android verfügbar)
        run: dotnet workload install maui-android wasm-tools --skip-sign-check --source https://api.nuget.org/v3/index.json

      - name: NuGet wiederherstellen
        run: dotnet restore JunimoModder.Android/JunimoModder.Android.csproj

      - name: APK/AAB bauen
        run: dotnet publish JunimoModder.Android/JunimoModder.Android.csproj -c Release -o output-android

      - name: APK/AAB hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Android-Bundle
          path: |
            output-android/*.apk
            output-android/*.aab

  build-windows:
    name: Windows Bundle
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET 9 installieren
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: MAUI Workloads installieren
        run: dotnet workload install maui-windows wasm-tools --skip-sign-check --source https://api.nuget.org/v3/index.json

      - name: NuGet wiederherstellen
        run: dotnet restore JunimoModder.Windows/JunimoModder.Windows.csproj

      - name: EXE bauen
        run: dotnet publish JunimoModder.Windows/JunimoModder.Windows.csproj -c Release -o output-win

      - name: EXE hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Bundle
          path: output-win/*.exe

  build-macos:
    name: macOS Bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: .NET 8 installieren  # MacCatalyst auf .NET 9 geht auf GitHub Actions NICHT!
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: MAUI Workload für MacCatalyst installieren
        run: dotnet workload install maui-maccatalyst wasm-tools --skip-sign-check --source https://api.nuget.org/v3/index.json

      - name: NuGet wiederherstellen
        run: dotnet restore JunimoModder.MacOS/JunimoModder.MacOS.csproj

      - name: Mac Catalyst App bauen
        run: dotnet publish JunimoModder.MacOS/JunimoModder.MacOS.csproj -c Release -o output-mac

      - name: Mac Bundle komprimieren
        run: tar -czvf JunimoModder-mac.tar.gz -C output-mac .

      - name: Mac-Bundle hochladen
        uses: actions/upload-artifact@v4
        with:
          name: MacOS-Bundle
          path: JunimoModder-mac.tar.gz
